name: TagBot

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: "3"

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    uses: EpiAware/.github/.github/workflows/tagbot.yml@de0f8f56ec29481854592c5e80602eee381febfe
    with:
      lookback: ${{ github.event.inputs.lookback || '3' }}
    secrets: inherit  # pragma: allowlist secret
