# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@6d4e35e2515f947acbf7d2a683cbf02b341005c7
    with:
      # Drop "lts" (1.10): `[sources]` in test/Project.toml (the unregistered
      # EpiAwarePackageTools git pin) is only honoured from Julia 1.11+, so on
      # 1.10 Pkg.test fails to resolve ("expected package EpiAwarePackageTools
      # to be registered"). Re-add once the kit is registered in General
      # (EpiAware/EpiAwarePackageTools.jl#731). "pre" is kept: it currently
      # passes on main (unlike `integration`, which drops it too for an
      # unrelated Mooncake/1.13 issue not present here).
      julia_versions: '["1", "pre"]'
      # Do not let one version's failure cancel the others, so a single-row
      # problem never masks the health of the rest of the matrix.
      fail_fast: false
    secrets: inherit  # pragma: allowlist secret

  # downgrade-compat is expected red until the kit is registered in General
  # (EpiAware/EpiAwarePackageTools.jl#731): the downgrade resolver drops the
  # unregistered-kit `[sources]` pin and fails to resolve ("expected package
  # EpiAwarePackageTools to be registered"), the same root cause as "lts"
  # above. Left enabled (unlike `integration`, which comments it out) so the
  # red status stays visible as a reminder rather than silently disappearing.
  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@6d4e35e2515f947acbf7d2a683cbf02b341005c7
    secrets: inherit  # pragma: allowlist secret
