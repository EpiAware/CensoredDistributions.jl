name: Benchmark

on:
  pull_request_target:
    branches: [main]
    paths:
      - 'src/**'
      - 'benchmark/**'

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1
        with:
          julia-version: '1'
          mode: 'time,memory'
