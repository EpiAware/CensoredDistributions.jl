name: AD Enzyme forward

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enzyme-forward:
    # Pinned to @main until EpiAware/.github tags @v1.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@main
    with:
      name: Enzyme forward
      tag: enzyme_forward
      flag: ad-enzyme-forward
    secrets: inherit  # pragma: allowlist secret
