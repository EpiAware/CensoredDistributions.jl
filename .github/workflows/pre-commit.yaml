name: pre-commit

# Thin caller: delegates to the shared EpiAware format-check workflow
# (EpiAware/.github). The JuliaFormatter pin (matching `test/formatter`)
# is passed as an input. See EpiAware/.github#8.
#
# NOTE: pinned to @main until EpiAware/.github tags @v1; switch to @v1 once
# that tag exists.

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  pre-commit:
    uses: EpiAware/.github/.github/workflows/format-check.yml@main
    with:
      juliaformatter_version: '2.5.5'
    secrets: inherit  # pragma: allowlist secret
