name: AD Enzyme reverse

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enzyme-reverse:
    # Pinned to @main until EpiAware/.github tags @v1.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@main
    with:
      name: Enzyme reverse
      tag: enzyme_reverse
      flag: ad-enzyme-reverse
    secrets: inherit  # pragma: allowlist secret
