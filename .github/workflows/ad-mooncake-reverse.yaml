name: AD Mooncake reverse

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mooncake-reverse:
    uses: ./.github/workflows/ad-backend.yaml
    with:
      name: Mooncake reverse
      tag: mooncake_reverse
      flag: ad-mooncake-reverse
    secrets: inherit  # pragma: allowlist secret
