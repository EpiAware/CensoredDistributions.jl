# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@dc919e0d1674c16d1518df07eda5ee0be09b47e2
    with:
      # Test only on Julia 1 (current stable). Two rows are intentionally
      # dropped until the blockers clear:
      #   - "lts" (1.10): `[sources]` in test/Project.toml is only honoured from
      #     Julia 1.11+, so on 1.10 the unregistered EpiAwarePackageTools pin is
      #     ignored and Pkg.test fails to resolve. Re-add once the kit is
      #     registered in General (EpiAware/EpiAwarePackageTools.jl#731).
      #   - "pre" (1.13 RC): Mooncake does not yet support the 1.13 release
      #     candidate — reverse-mode on the nested-Resolve composed model aborts
      #     ("All built-in functions are primitives...", ConcurrencyViolationError;
      #     test/integration/ComposedParametersModel.jl). Re-add "pre" once
      #     Mooncake supports Julia 1.13.
      julia_versions: '["1"]'
      # Do not let one version's failure cancel the others, so a single-row
      # problem never masks the health of the rest of the matrix.
      fail_fast: false
    secrets: inherit  # pragma: allowlist secret

  # downgrade-compat is deferred: the downgrade resolver drops the
  # unregistered-kit `[sources]` pin and fails to resolve ("expected package
  # EpiAwarePackageTools to be registered"), so it cannot pass until the kit is
  # registered in General (EpiAware/EpiAwarePackageTools.jl#731). Re-enable this
  # job once the pin becomes a plain [compat] entry.
  # downgrade-compat:
  #   uses: EpiAware/.github/.github/workflows/downgrade.yml@dc919e0d1674c16d1518df07eda5ee0be09b47e2
  #   secrets: inherit  # pragma: allowlist secret
