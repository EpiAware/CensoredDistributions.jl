name: AD Enzyme forward

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enzyme-forward:
    uses: ./.github/workflows/ad-backend.yaml
    with:
      name: Enzyme forward
      tag: enzyme_forward
