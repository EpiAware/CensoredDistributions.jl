name: Code coverage

# Thin caller: delegates to the shared EpiAware coverage workflow
# (EpiAware/.github). See EpiAware/.github#8.
#
# NOTE: reusable workflows are pinned to a full release SHA (the secure
# practice GitHub recommends); Dependabot's github-actions updater bumps
# the pin and rewrites the trailing version comment.

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    with:
      julia_version: '1'
      flags: unit
      coverage_directories: src
      fail_ci_if_error: true
    secrets: inherit  # pragma: allowlist secret
