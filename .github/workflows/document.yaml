name: Documenter
on:
  push:
    branches: main
    tags: '*'
  pull_request:
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

# Workflow-level concurrency cancels superseded builds for the same ref
# (e.g. pushing new commits to a PR). It is keyed on the ref so that a
# main build and a PR build are never in the same group and a new PR
# commit does not cancel an unrelated build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documenter:
    permissions:
      contents: write
      statuses: write
      pull-requests: write
    name: Documentation
    runs-on: ubuntu-latest
    # Job-level concurrency serialises the gh-pages deploy across all
    # refs. Documenter force-pushes gh-pages, so two deploys running at
    # once (main vs PR, or two PRs) clobber each other. A single shared
    # group with cancel-in-progress: false queues deploys instead of
    # cancelling them, so none is lost. This group is deliberately not
    # keyed on github.ref so that cross-ref deploys serialise.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
      - uses: julia-actions/cache@v3
      - run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - uses: julia-actions/julia-docdeploy@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Comment PR with docs preview
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.issue.number;
            const repo_owner = context.repo.owner;
            const repo_name = context.repo.repo;

            const docs_url = `https://${repo_owner}.github.io/${repo_name}/previews/PR${pr_number}/`;

            const comment_body = `
            📖 **Documentation preview** is ready!

            View the docs for this PR at: ${docs_url}

            *This preview will be updated automatically when you push new commits.*
            `;

            // Get existing comments to avoid duplicates
            const comments = await github.rest.issues.listComments({
              owner: repo_owner,
              repo: repo_name,
              issue_number: pr_number
            });

            const bot_comment = comments.data.find(comment =>
              comment.user.login === 'github-actions[bot]' &&
              comment.body.includes('Documentation preview')
            );

            if (bot_comment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: repo_owner,
                repo: repo_name,
                comment_id: bot_comment.id,
                body: comment_body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: repo_owner,
                repo: repo_name,
                issue_number: pr_number,
                body: comment_body
              });
            }
