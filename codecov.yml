# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
# Coverage is reported under flags so the main unit suite and each
# per-backend AD gradient suite stay separately attributable (each gets
# its own Codecov badge) while still rolling up into one project total.
#
# `carryforward: true` keeps a flag's last value when a given workflow run
# does not re-upload it: the `unit` job (codecoverage.yaml) and the six AD
# jobs (ad-*.yaml) run and upload independently, so without carryforward a
# run that posts only some flags would blank the others.
#
# The 7 flag uploads (unit + per-backend AD) arrive from
# separate workflows that finish minutes apart. Codecov recomputes the
# patch/project status on every upload, so without a gate it posts an early
# FAILURE from a partial session set (a line only exercised by an AD backend
# reads as a patch miss until that backend's upload lands). `after_n_builds`
# holds the status notification until all uploads are in, and `wait_for_ci`
# keeps Codecov from finalising before CI itself reports. The patch/project
# targets use `auto` (compare against the parent commit) with a small
# threshold so the diff is judged on its true coverage rather than a transient
# under-count.
codecov:
  notify:
    after_n_builds: 7
    wait_for_ci: true

# The composed-stack integration branch (#363) added a large body of code
# ahead of its tests — several package extensions (FlexiChains, Catalyst,
# Bijectors, LogDensityProblems, Integrals) are exercised only under their
# trigger packages and currently report 0% here, dragging project coverage
# down ~17 points and patch to ~50%. That coverage backfill is tracked as a
# separate follow-up; until it lands, the patch/project statuses are marked
# `informational: true` so they still REPORT coverage (badge, PR comment,
# per-flag deltas) but do not BLOCK the integration PR on a gap that is being
# addressed out of band. Flip these back to blocking once the backfill lands.
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true

comment:
  after_n_builds: 7

flags:
  unit:
    paths:
      - src
      - ext
    carryforward: true
  ad-forwarddiff:
    paths:
      - src
      - ext
    carryforward: true
  ad-reversediff:
    paths:
      - src
      - ext
    carryforward: true
  ad-enzyme-forward:
    paths:
      - src
      - ext
    carryforward: true
  ad-enzyme-reverse:
    paths:
      - src
      - ext
    carryforward: true
  ad-mooncake-reverse:
    paths:
      - src
      - ext
    carryforward: true
  ad-mooncake-forward:
    paths:
      - src
      - ext
    carryforward: true
