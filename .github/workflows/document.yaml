name: Documenter

on:
  push:
    branches: main
    tags: '*'
  pull_request:
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documenter:
    uses: EpiAware/.github/.github/workflows/documentation.yml@9692b37b9127099d9c1a51db5034a084edaeb56e
    secrets: inherit  # pragma: allowlist secret
