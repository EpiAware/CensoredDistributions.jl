name: TagBot

# Thin caller: delegates to the shared EpiAware TagBot workflow
# (EpiAware/.github). The triggers and the JuliaTagBot actor guard stay
# here; DOCUMENTER_KEY is inherited. See EpiAware/.github#8.
#
# NOTE: reusable workflows are pinned to a full release SHA (the secure
# practice GitHub recommends); Dependabot's github-actions updater bumps
# the pin and rewrites the trailing version comment.

on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      lookback:
        default: "3"

jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    uses: EpiAware/.github/.github/workflows/tagbot.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    with:
      lookback: ${{ github.event.inputs.lookback || '3' }}
    secrets: inherit  # pragma: allowlist secret
