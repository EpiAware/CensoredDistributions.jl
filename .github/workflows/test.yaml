name: Test

# Thin caller: delegates to the shared EpiAware reusable workflows
# (EpiAware/.github). Package-specific inputs (the Julia version matrix)
# are passed here; the matrix definition, step ordering and skip_quality
# convention live in the reusable workflow. See EpiAware/.github#8.
#
# NOTE: pinned to @main until EpiAware/.github tags @v1; switch to @v1 once
# that tag exists.

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@main
    with:
      julia_versions: '["1", "lts", "pre"]'
      os: '["ubuntu-latest", "windows-latest", "macOS-latest"]'
      experimental_versions: '["pre"]'
    secrets: inherit  # pragma: allowlist secret

  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@main
    with:
      julia_version: '1.10'
      mode: deps
    secrets: inherit  # pragma: allowlist secret

  # AD gradient tests run per backend in dedicated workflows
  # (ad-<backend>.yaml) so each backend has its own status badge and a
  # transiently unstable backend only reds its own run (#269).
