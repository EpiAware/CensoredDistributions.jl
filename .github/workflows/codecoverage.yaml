name: Code coverage

# Thin caller: delegates to the shared EpiAware coverage workflow
# (EpiAware/.github). See EpiAware/.github#8.
#
# NOTE: pinned to @main until EpiAware/.github tags @v1; switch to @v1 once
# that tag exists.

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    uses: EpiAware/.github/.github/workflows/coverage.yml@main
    with:
      julia_version: '1'
      flags: unit
      coverage_directories: src
      fail_ci_if_error: true
    secrets: inherit  # pragma: allowlist secret
