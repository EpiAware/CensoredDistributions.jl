name: pre-commit

# Thin caller: delegates to the shared EpiAware format-check workflow
# (EpiAware/.github). The JuliaFormatter pin (matching `test/formatter`)
# is passed as an input. See EpiAware/.github#8.
#
# NOTE: reusable workflows are pinned to a full release SHA (the secure
# practice GitHub recommends); Dependabot's github-actions updater bumps
# the pin and rewrites the trailing version comment.

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

jobs:
  pre-commit:
    uses: EpiAware/.github/.github/workflows/format-check.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    with:
      juliaformatter_version: '2.5.5'
    secrets: inherit  # pragma: allowlist secret
