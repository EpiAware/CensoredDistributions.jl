name: AD ForwardDiff

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forwarddiff:
    # Pinned to @main until EpiAware/.github tags @v1.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@main
    with:
      name: ForwardDiff
      tag: forwarddiff
      flag: ad-forwarddiff
    secrets: inherit  # pragma: allowlist secret
