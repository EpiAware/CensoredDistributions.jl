name: Doc Preview Cleanup

# Thin caller: delegates to the shared EpiAware docs-preview-cleanup
# workflow (EpiAware/.github). See EpiAware/.github#8.
#
# NOTE: reusable workflows are pinned to a full release SHA (the secure
# practice GitHub recommends); Dependabot's github-actions updater bumps
# the pin and rewrites the trailing version comment.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  doc-preview-cleanup:
    uses: EpiAware/.github/.github/workflows/docs-preview-cleanup.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    with:
      git_user_name: CensoredDistributions.jl
      git_user_email: action@github.com
    secrets: inherit  # pragma: allowlist secret
