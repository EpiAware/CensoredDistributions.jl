[compat]
# The kit's managed `test_formatting` (test/package/quality.jl) resolves
# JuliaFormatter from this env directly, unlike `test_linting`'s isolated
# `test/jet` env -- the kit standard doesn't isolate formatting at all, so
# this pin is this env's only defence against #286 (a JuliaFormatter patch
# release reformatting differently across the Julia CI matrix's separate
# per-version Manifest caches, redding every open PR and main). Exact-pinned
# to match `test/formatter/Project.toml` (the Taskfile-driven local
# `task format`/`task test-formatting` env, still used directly and kept
# alongside this one) and `.pre-commit-config.yaml`'s hook `rev`, so all
# three formatting paths agree on one version.
JuliaFormatter = "=2.5.5"

[sources]
CensoredDistributions = {path = ".."}
# Until EpiAwarePackageTools is registered, it is pinned by git so
# the env resolves out of the box. Switch to a local path to
# develop the kit alongside this package.
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}
