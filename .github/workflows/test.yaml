name: Test

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    uses: EpiAware/.github/.github/workflows/tests.yml@6d4e35e2515f947acbf7d2a683cbf02b341005c7
    # lts (1.10) excluded while the unregistered EpiAwareADTools is
    # pinned via [sources], which Pkg only understands on >= 1.11.
    # Remove once EpiAwareADTools is registered (same pattern as
    # ConvolvedDistributions' kit pin, EpiAwarePackageTools#115).
    with:
      julia_versions: '["1", "pre"]'
    secrets: inherit  # pragma: allowlist secret

  downgrade-compat:
    uses: EpiAware/.github/.github/workflows/downgrade.yml@6d4e35e2515f947acbf7d2a683cbf02b341005c7
    # 1.11 not the workflow's 1.10 default, for the same [sources] reason.
    with:
      julia_version: '1.11'
    secrets: inherit  # pragma: allowlist secret
