name: Documenter

# Thin caller: delegates to the shared EpiAware documentation workflow
# (EpiAware/.github). See EpiAware/.github#8.
#
# NOTE: reusable workflows are pinned to a full release SHA (the secure
# practice GitHub recommends); Dependabot's github-actions updater bumps
# the pin and rewrites the trailing version comment.

on:
  push:
    branches: main
    tags: '*'
  pull_request:
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documenter:
    uses: EpiAware/.github/.github/workflows/documentation.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    secrets: inherit  # pragma: allowlist secret
