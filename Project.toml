# Dev (unregistered) git sources; CD is not releasable until these are
# registered. ConvolvedDistributions is listed because `[sources]` is not
# honoured transitively and ComposedDistributions depends on the 0.2 line it is
# written against. ComposedDistributions is pinned to `chore/convolved-0.2-
# compat` rather than `main` only because its `main` still caps
# ConvolvedDistributions at 0.1 while its own source targets 0.2, so `main`
# cannot resolve; repoint to `main` once that compat bump lands. See #851 for
# the same pattern.
#
# ConvolvedDistributions is pinned to a commit SHA, not `main`: `main` moved
# to depend on `EpiAwareADTools`, which has no registered versions anywhere
# (CD's own migration onto it, #850, is not merged either), so a fresh
# resolve against current `main` is unconditionally broken -- unsatisfiable,
# not merely undesirable. `da71dd1` is the last commit before that migration
# landed. Repoint once EpiAwareADTools is registered (or ConvolvedDistributions
# reverts/completes that migration on a resolvable line).
[sources]
ComposedDistributions = {url = "https://github.com/EpiAware/ComposedDistributions.jl", rev = "chore/convolved-0.2-compat"}
ConvolvedDistributions = {url = "https://github.com/EpiAware/ConvolvedDistributions.jl", rev = "da71dd1faf1eb4c67ab89197b29eaba7ef573f06"} # pragma: allowlist secret

[workspace]
projects = ["test", "docs"]
