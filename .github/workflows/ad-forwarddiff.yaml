name: AD ForwardDiff

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forwarddiff:
    # Pinned to a release SHA; Dependabot keeps it current.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    with:
      name: ForwardDiff
      tag: forwarddiff
      flag: ad-forwarddiff
    secrets: inherit  # pragma: allowlist secret
