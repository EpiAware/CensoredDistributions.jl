name: Documenter

# Thin caller: delegates to the shared EpiAware documentation workflow
# (EpiAware/.github). See EpiAware/.github#8.
#
# NOTE: pinned to @main until EpiAware/.github tags @v1; switch to @v1 once
# that tag exists.

on:
  push:
    branches: main
    tags: '*'
  pull_request:
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documenter:
    uses: EpiAware/.github/.github/workflows/documentation.yml@main
    secrets: inherit  # pragma: allowlist secret
