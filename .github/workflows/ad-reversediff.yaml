name: AD ReverseDiff

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reversediff:
    # Pinned to @main until EpiAware/.github tags @v1.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@main
    with:
      name: ReverseDiff (tape)
      tag: reversediff
      flag: ad-reversediff
    secrets: inherit  # pragma: allowlist secret
