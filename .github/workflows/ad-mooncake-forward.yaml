name: AD Mooncake forward

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mooncake-forward:
    # Pinned to @main until EpiAware/.github tags @v1.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@main
    with:
      name: Mooncake forward
      tag: mooncake_forward
      flag: ad-mooncake-forward
    secrets: inherit  # pragma: allowlist secret
