# ReparameterisedDistributions is not yet registered, so its location is pinned
# here for development and CI. Note `[sources]` is only honoured on Julia 1.11+,
# and it does not survive registration: a released CensoredDistributions cannot
# depend on an unregistered package, so cutting a version that carries this dep
# is gated on ReparameterisedDistributions reaching the General registry.
[sources]
ReparameterisedDistributions = {url = "https://github.com/EpiAware/ReparameterisedDistributions.jl", rev = "main"}

[workspace]
projects = ["test", "docs"]
