name: Doc Preview Cleanup

# Thin caller: delegates to the shared EpiAware docs-preview-cleanup
# workflow (EpiAware/.github). See EpiAware/.github#8.
#
# NOTE: pinned to @main until EpiAware/.github tags @v1; switch to @v1 once
# that tag exists.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  doc-preview-cleanup:
    uses: EpiAware/.github/.github/workflows/docs-preview-cleanup.yml@main
    with:
      git_user_name: CensoredDistributions.jl
      git_user_email: action@github.com
    secrets: inherit  # pragma: allowlist secret
