name: Documenter

on:
  push:
    branches: main
    tags: '*'
  pull_request:
  merge_group:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documenter:
    uses: EpiAware/.github/.github/workflows/documentation.yml@de0f8f56ec29481854592c5e80602eee381febfe
    secrets: inherit  # pragma: allowlist secret
