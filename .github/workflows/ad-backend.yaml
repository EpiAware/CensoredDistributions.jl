name: AD backend

# Reusable workflow: runs the shared AD gradient suite
# (`test/ad/runtests.jl`) for a single backend, selected by test-item tag.
# Each backend has its own thin caller workflow (ad-<backend>.yaml) so it
# gets its own status badge, while the test code stays in one place (#269).

on:
  workflow_call:
    inputs:
      name:
        description: Display name for the run (e.g. "Enzyme reverse")
        required: true
        type: string
      tag:
        description: Test-item tag to select (e.g. enzyme_reverse)
        required: true
        type: string
      julia-version:
        description: Julia version to test on
        required: false
        type: string
        default: '1'

jobs:
  ad:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - uses: julia-actions/cache@v3
      - name: Instantiate test/ad
        run: julia --project=test/ad -e 'using Pkg; Pkg.instantiate()'
      - name: Run AD gradient tests
        run: julia --project=test/ad test/ad/runtests.jl ${{ inputs.tag }}
