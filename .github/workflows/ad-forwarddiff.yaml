name: AD ForwardDiff

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forwarddiff:
    uses: ./.github/workflows/ad-backend.yaml
    with:
      name: ForwardDiff
      tag: forwarddiff
      flag: ad-forwarddiff
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}  # pragma: allowlist secret
