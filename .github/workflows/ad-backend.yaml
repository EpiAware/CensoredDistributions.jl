name: AD backend

# Reusable workflow: runs the shared AD gradient suite
# (`test/ad/runtests.jl`) for a single backend, selected by test-item tag.
# Each backend has its own thin caller workflow (ad-<backend>.yaml) so it
# gets its own status badge, while the test code stays in one place (#269).

on:
  workflow_call:
    inputs:
      name:
        description: Display name for the run (e.g. "Enzyme reverse")
        required: true
        type: string
      tag:
        description: Test-item tag to select (e.g. enzyme_reverse)
        required: true
        type: string
      flag:
        description: Codecov flag for this backend (e.g. ad-enzyme-reverse)
        required: true
        type: string
      julia-version:
        description: Julia version to test on
        required: false
        type: string
        default: '1'
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  ad:
    name: ${{ inputs.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.julia-version }}
      - uses: julia-actions/cache@v3
      - name: Instantiate test/ad
        run: julia --project=test/ad -e 'using Pkg; Pkg.instantiate()'
      # `--code-coverage=user` instruments `src/` and `ext/` (the package
      # is a path dependency of `test/ad`, so `.cov` files land next to the
      # source) so we can attribute which lines this backend exercises.
      - name: Run AD gradient tests
        run: |
          julia --project=test/ad --code-coverage=user \
            test/ad/runtests.jl ${{ inputs.tag }}
      # Walk `src/` and `ext/` explicitly. Each AD job runs a single Julia
      # version, so extension coverage attributes reproducibly (#252).
      - uses: julia-actions/julia-processcoverage@v1
        with:
          directories: src,ext
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          flags: ${{ inputs.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
