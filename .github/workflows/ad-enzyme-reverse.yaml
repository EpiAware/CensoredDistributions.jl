name: AD Enzyme reverse

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enzyme-reverse:
    # Pinned to a release SHA; Dependabot keeps it current.
    uses: EpiAware/.github/.github/workflows/ad-backend.yml@f73e8f8f19b2b658a552b1c21af77110f44a36b0 # v1.0.0
    with:
      name: Enzyme reverse
      tag: enzyme_reverse
      flag: ad-enzyme-reverse
    secrets: inherit  # pragma: allowlist secret
